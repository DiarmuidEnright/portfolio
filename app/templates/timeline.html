{% extends "base.html" %}

{% block head %}
<style>
    /* Scoped styles so we don't break your main site CSS */
    .timeline-container { 
        max-width: 600px; 
        margin: 2rem auto; 
        padding: 0 1rem; 
    }
    .timeline-form { 
        display: flex; 
        flex-direction: column; 
        gap: 10px; 
        margin-bottom: 2rem; 
        background: rgba(0, 0, 0, 0.05); 
        padding: 1.5rem; 
        border-radius: 8px; 
    }
    .timeline-form input, .timeline-form textarea { 
        padding: 0.5rem; 
        font-family: inherit; 
        border: 1px solid #ccc; 
        border-radius: 4px; 
    }
    .timeline-form button { 
        padding: 0.75rem; 
        cursor: pointer; 
        background: #333; 
        color: white; 
        border: none; 
        border-radius: 4px; 
        font-weight: bold; 
    }
    .timeline-form button:hover { background: #555; }
    .post { 
        border: 1px solid #e0e0e0; 
        padding: 1rem; 
        margin-bottom: 1rem; 
        border-radius: 8px; 
        display: flex; 
        gap: 15px; 
        background: rgba(255, 255, 255, 0.8); 
    }
    img.gravatar { border-radius: 50%; width: 50px; height: 50px; }
    .post-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
    .post-content { margin: 0; }
</style>
{% endblock %}

{% block content %}
<div class="timeline-container">
    <h1>Timeline</h1>
    
    <form id="timeline-form" class="timeline-form">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="content" placeholder="What's on your mind?" rows="3" required></textarea>
        <button type="submit">Post to Timeline</button>
    </form>

    <div id="posts">
        {% for post in timeline_posts %}
        <div class="post">
            <img src="{{ post.gravatar }}" alt="{{ post.name }}'s Avatar" class="gravatar">
            <div style="flex-grow: 1;">
                <div class="post-header">
                    <strong>{{ post.name }}</strong>
                    <small>{{ post.created_at }}</small>
                </div>
                <p class="post-content">{{ post.content }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const form = document.getElementById('timeline-form');
    form.addEventListener('submit', async (e) => {
        e.preventDefault(); 
        const formData = new FormData(form);
        
        const response = await fetch('/api/timeline_post', {
            method: 'POST',
            body: formData
        });
        
        if (response.ok) {
            window.location.reload(); 
        } else {
            alert("Failed to submit post. Please try again.");
        }
    });
</script>
{% endblock %}
