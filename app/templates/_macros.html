{% macro timeline_card(title, subtitle, period, description) %}
<div class="card">
    <div class="card-header">
        <h3>{{ title }}</h3>
        <span class="card-period">{{ period }}</span>
    </div>
    <p class="card-subtitle">{{ subtitle }}</p>
    <p class="card-description">{{ description }}</p>
</div>
{% endmacro %}
