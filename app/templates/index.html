{% extends "base.html" %}

{% block content %}
<div class="profile">
    <div id="profile-picture" class="profile-picture">
        <img src="{{ url_for('static', filename='img/' ~ about.photo) }}" alt="{{ about.name }}">
    </div>
    <h1>{{ about.name }}</h1>
    <p class="tagline">{{ about.tagline }}</p>
</div>

<section class="section" id="about">
    <h2>About Me</h2>
    <p class="bio">{{ about.bio }}</p>
</section>

{% endblock %}
